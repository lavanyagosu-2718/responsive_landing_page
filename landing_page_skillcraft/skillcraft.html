<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<link rel="stylesheet" href="style.css">
<style>
 /* Google Font */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Body */

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

/* Navbar */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 70px;
transition:0.4s;
z-index:1000;
}

.logo{
font-size:26px;
font-weight:600;
color:#00eaff;
letter-spacing:1px;
}

/* Menu */

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin:0 18px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:18px;
padding:6px 10px;
border-radius:5px;
transition:0.3s;
}

/* Hover effect */

nav ul li a:hover{
background:#00eaff;
color:#000;
}

/* Scroll Navbar */

.scrolled{
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* Hero Section */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
background:linear-gradient(90deg,#00eaff,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:20px;
max-width:600px;
margin-bottom:30px;
}

/* Button */

.hero button{
padding:14px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#00eaff;
color:black;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
transform:scale(1.1);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* Page Sections */

.page{
padding:140px 80px;
text-align:center;
}

.page h1{
font-size:45px;
margin-bottom:25px;
color:#00eaff;
}

.page p{
max-width:800px;
margin:auto;
font-size:18px;
line-height:1.7;
}

/* Services Section */

.service-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:40px;
}

/* Service Card */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:35px;
width:260px;
border-radius:15px;
transition:0.4s;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.card h3{
color:#00eaff;
margin-bottom:15px;
}

.card:hover{
transform:translateY(-12px) scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* Contact Form */

form{
max-width:450px;
margin:auto;
display:flex;
flex-direction:column;
gap:18px;
margin-top:30px;
}

/* Input fields */

input,textarea{
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;
}

/* Submit Button */

form button{
padding:12px;
background:#00eaff;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

form button:hover{
background:white;
color:black;
transform:scale(1.05);
}

/* Responsive Design */

@media(max-width:768px){

nav{
flex-direction:column;
padding:20px;
}

.hero h1{
font-size:40px;
}

.page{
padding:120px 30px;
}

.service-container{
flex-direction:column;
align-items:center;
}

}

</style>
</head>

<body>

<nav id="navbar">

<h2 class="logo">SkillLanding</h2>

<ul>

<li><a href="next.html">Home</a></li>
<li><a href="next.html">About</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

<div class="nav">
    <a href="next.html">ABOUT</a>
    <a href="services.html">SERVICES</a>
    <a href="contact.html">CONTACT</a>
    
</div>

</nav>

<section class="hero">

<h1>Welcome to My Landing Page</h1>

<p>Modern responsive website created using HTML, CSS and JavaScript.</p>

<button>Learn More</button>

</section>

<script src="script.js"></script>

</body>
</html>
